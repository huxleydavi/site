<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha do Cliente - Aristóteles Botinas</title>
  <link rel="stylesheet" href="css/vendedor-shared.css">
  <style>
    :root{--verde:#254e39;--verde-escuro:#1d3d2d;--vermelho:#b22222;--fundo:#f5f5f5;--texto:#1f1f1f;--sub:#6b7280;--borda:#e8e8e8;--sombra:0 8px 24px rgba(0,0,0,0.08);--radius:16px;}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:Arial,Helvetica,sans-serif;background:var(--fundo);color:var(--texto);min-height:100vh}
    main{max-width:1100px;margin:0 auto;padding:16px 16px 96px}
    .hero{background:linear-gradient(135deg,var(--verde),var(--verde-escuro));color:#fff;border-radius:20px;padding:18px;box-shadow:var(--sombra);margin:12px 0}
    .hero-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px}.hero-top h1{font-size:34px;line-height:1.1;margin:3px 0 6px}.hero-top p{opacity:.92;line-height:1.5}.eyebrow{font-size:13px;opacity:.85}.status-badge{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.14);font-weight:800}
    .hero-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.hero-box{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px}.hero-box span{display:block;font-size:11px;opacity:.75;margin-bottom:4px}.hero-box strong{font-size:18px}
    .actions-top{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:14px 0 16px}.actions-top button{border:none;border-radius:14px;padding:14px;font-weight:800;cursor:pointer}.btn-main{background:linear-gradient(135deg,var(--verde),var(--verde-escuro));color:#fff}.btn-outline{background:#fff;border:1px solid #e6e6e6;color:var(--verde)}.btn-danger{background:#fff3f3;border:1px solid #ffdede;color:var(--vermelho)}
    .layout{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}.card{background:#fff;border:1px solid var(--borda);border-radius:18px;padding:16px;box-shadow:var(--sombra)}.card h2{font-size:20px;color:var(--verde);margin-bottom:12px}.info-list{display:flex;flex-direction:column;gap:10px}.info-item{background:#fafafa;border:1px solid #efefef;border-radius:14px;padding:12px}.info-item span{display:block;font-size:12px;color:var(--sub);margin-bottom:4px}.info-item strong{font-size:15px;line-height:1.45}
    .obs-box{background:#fafafa;border:1px solid #ececec;border-radius:14px;padding:14px;font-size:14px;color:#444;line-height:1.6}.history-list{display:flex;flex-direction:column;gap:10px}.history-item{border:1px solid #ededed;border-radius:14px;padding:12px;background:#fcfcfc}.history-top{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px}.history-top strong{font-size:14px}.history-top span{font-size:12px;color:var(--sub)}.history-item p{font-size:13px;color:var(--sub);line-height:1.45}.mini-solid{border:none;background:var(--verde);color:#fff;border-radius:10px;padding:10px 12px;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:9999}.modal-overlay.show{display:flex}.modal-box{width:100%;max-width:560px;max-height:90vh;overflow:auto;background:#fff;border-radius:22px;padding:20px;box-shadow:0 24px 64px rgba(0,0,0,.24)}.modal-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.modal-top h3{font-size:22px;color:var(--verde)}.close-x{width:38px;height:38px;border:none;border-radius:12px;background:#f4f4f4;font-size:18px;cursor:pointer}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}.field label{font-size:12px;font-weight:700;color:#4b5563}.field input,.field textarea{width:100%;border:1px solid #e5e7eb;border-radius:14px;padding:12px;font-size:14px;outline:none}.field textarea{min-height:92px;resize:vertical}.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.modal-actions button{border:none;border-radius:14px;padding:14px;font-weight:800;cursor:pointer}
    .top-header{
    background: linear-gradient(135deg, #254e39, #1d3d2d);
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
    box-shadow: 0 4px 14px rgba(0,0,0,.12);
    border-bottom: 1px solid rgba(255,255,255,.08);
}

.top-header h2,
.top-header h1{
    margin: 0;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: .2px;
}

.top-header .nav-header{
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.top-header .nav-header button{
    background: rgba(255,255,255,.12);
    color: #fff;
    border: 1px solid rgba(255,255,255,.14);
    padding: 9px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: .2s;
}

.top-header .nav-header button:hover{
    background: rgba(255,255,255,.2);
    transform: translateY(-1px);
}

.top-header .nav-header button.ativo{
    background: #fff;
    color: #254e39;
    border-color: #fff;
}
    @media (max-width:860px){.layout{grid-template-columns:1fr}.actions-top{grid-template-columns:1fr}.hero-grid,.form-grid{grid-template-columns:1fr}.hero-top h1{font-size:28px}}
  </style>
</head>
<body>
<header class="top-header">
    <h2>Área do Vendedor</h2>

    <div class="nav-header">
        <button onclick="location.href='vendedores.html'">🏠 Painel</button>
        <button onclick="location.href='clientes.html'" class="ativo">👥 Clientes</button>
        <button onclick="location.href='novo-pedido.html'">🛒 Pedido</button>
        <button onclick="location.href='historico-pedidos.html'">📄 Histórico</button>
        <button onclick="location.href='rota.html'">📍 Rota</button>
    </div>
</header>
  <main id="clienteFichaRoot"></main>

  <div class="modal-overlay" id="editarClienteModal">
    <div class="modal-box">
      <div class="modal-top"><h3>Editar cliente</h3><button class="close-x" onclick="fecharEditarCliente()">✕</button></div>
      <div class="form-grid">
        <div class="field full"><label>Razão social</label><input id="edit_nome"></div>
        <div class="field"><label>Apelido</label><input id="edit_apelido"></div>
        <div class="field"><label>Responsável</label><input id="edit_responsavel"></div>
        <div class="field"><label>Telefone</label><input id="edit_telefone"></div>
        <div class="field"><label>CNPJ</label><input id="edit_cnpj"></div>
        <div class="field"><label>Região</label><input id="edit_regiao"></div>
        <div class="field full"><label>Endereço</label><input id="edit_endereco"></div>
        <div class="field"><label>Número</label><input id="edit_numero"></div>
        <div class="field"><label>Bairro</label><input id="edit_bairro"></div>
        <div class="field"><label>Cidade</label><input id="edit_cidade"></div>
        <div class="field"><label>Status</label><input id="edit_status"></div>
        <div class="field full"><label>Observações</label><textarea id="edit_obs"></textarea></div>
      </div>
      <div class="modal-actions">
        <button class="btn-main" onclick="salvarClienteEditado()">Salvar alterações</button>
        <button class="btn-danger" onclick="excluirClienteAtual()">Excluir cliente</button>
      </div>
    </div>
  </div>

  <script>
    const KEY='aristoteles_vendedor_pro_db';
    function safe(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
    function fmtMoney(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
    function fmtDate(v){try{return new Date(v).toLocaleDateString('pt-BR')}catch(e){return '-'}}
    function uid(p){return p+'_'+Date.now()+'_'+Math.floor(Math.random()*10000)}
    function loadDB(){try{const db=JSON.parse(localStorage.getItem(KEY))||{};db.clients=Array.isArray(db.clients)?db.clients:[];db.orders=Array.isArray(db.orders)?db.orders:[];db.route=db.route&&typeof db.route==='object'?db.route:{clients:[]};db.route.clients=Array.isArray(db.route.clients)?db.route.clients:[];db.currentOrder=db.currentOrder&&typeof db.currentOrder==='object'?db.currentOrder:null;return db}catch(e){return {clients:[],orders:[],route:{clients:[]},currentOrder:null}}}
    function saveDB(db){localStorage.setItem(KEY,JSON.stringify(db))}
    function getClientId(){return new URLSearchParams(location.search).get('id')||localStorage.getItem('clienteAtualId')||localStorage.getItem('clienteAtual')||''}
    function setClientId(id){localStorage.setItem('clienteAtualId',id);localStorage.setItem('clienteAtual',id)}
    function routeContains(id){return loadDB().route.clients.includes(id)}
    function orderTotals(order){const itens=order?.items||[];return {total:itens.reduce((a,i)=>a+Number(i.subtotal||0),0),pares:itens.reduce((a,i)=>a+Number(i.qtd||0),0)}}
    function getClient(){const db=loadDB();const id=getClientId();const c=db.clients.find(x=>x.id===id);if(c) setClientId(c.id);return c}
    function render(){const db=loadDB();const client=getClient();const root=document.getElementById('clienteFichaRoot');if(!client){root.innerHTML='<section class="card" style="margin-top:16px">Cliente não encontrado.</section>';return}const orders=db.orders.filter(o=>o.clientId===client.id).sort((a,b)=>new Date(b.finalizedAt||b.createdAt)-new Date(a.finalizedAt||a.createdAt));const total=orders.reduce((a,o)=>a+orderTotals(o).total,0);root.innerHTML=`<section class="hero"><div class="hero-top"><div><p class="eyebrow">Cliente selecionado</p><h1>${safe(client.nome)}</h1><p>${safe(client.bairro||'Sem bairro')} • ${safe(client.cidade||'-')}</p></div><span class="status-badge">${safe(client.status||'Ativo')}</span></div><div class="hero-grid"><div class="hero-box"><span>Pedidos</span><strong>${orders.length}</strong></div><div class="hero-box"><span>Total comprado</span><strong>${fmtMoney(total)}</strong></div><div class="hero-box"><span>Telefone</span><strong>${safe(client.telefone||'-')}</strong></div><div class="hero-box"><span>Responsável</span><strong>${safe(client.responsavel||'-')}</strong></div></div></section><div class="actions-top"><button class="btn-main" onclick="novoPedidoCliente()">+ Novo Pedido</button><button class="btn-outline" onclick="abrirEditarCliente()">Editar cliente</button><button class="${routeContains(client.id)?'btn-danger':'btn-outline'}" onclick="toggleRotaCliente()">${routeContains(client.id)?'Remover da rota':'Adicionar na rota'}</button></div><div class="layout"><section class="card"><h2>Dados do cliente</h2><div class="info-list"><div class="info-item"><span>Razão social</span><strong>${safe(client.nome)}</strong></div><div class="info-item"><span>Apelido da loja</span><strong>${safe(client.apelido||'-')}</strong></div><div class="info-item"><span>Telefone</span><strong>${safe(client.telefone||'-')}</strong></div><div class="info-item"><span>CNPJ</span><strong>${safe(client.cnpj||'-')}</strong></div><div class="info-item"><span>Endereço</span><strong>${safe([client.endereco,client.numero,client.bairro,client.cidade].filter(Boolean).join(' • ')||'-')}</strong></div><div class="info-item"><span>Região</span><strong>${safe(client.regiao||'-')}</strong></div></div></section><section class="card"><h2>Observações</h2><div class="obs-box">${safe(client.obs||'Sem observações cadastradas.')}</div><button class="btn-maps" style="margin-top:14px;" onclick="abrirMaps()">Abrir no Maps</button></section><section class="card" style="grid-column:1/-1"><h2>Histórico recente</h2><div class="history-list">${orders.length?orders.slice(0,5).map(o=>{const t=orderTotals(o);return `<div class="history-item"><div class="history-top"><strong>Pedido ${safe(o.id)}</strong><span>${fmtDate(o.finalizedAt||o.createdAt)}</span></div><p>Total: ${fmtMoney(t.total)} • ${t.pares} pares</p><button class="mini-solid" onclick="location.href='historico-pedidos.html'">Ver histórico</button></div>`}).join(''):'<div class="obs-box">Nenhum pedido para este cliente ainda.</div>'}</div></section></div>`}
    function novoPedidoCliente(){const c=getClient();if(!c)return;const db=loadDB();setClientId(c.id);db.currentOrder={id:uid('ped'),clientId:c.id,items:[],notes:'',createdAt:new Date().toISOString(),status:'rascunho'};saveDB(db);location.href='novo-pedido.html'}
    function toggleRotaCliente(){const db=loadDB();const c=getClient();if(!c)return;const idx=db.route.clients.indexOf(c.id);if(idx>=0) db.route.clients.splice(idx,1); else db.route.clients.push(c.id);saveDB(db);render()}
    function abrirMaps(){const c=getClient();if(!c)return;const q=encodeURIComponent([c.nome,c.endereco,c.numero,c.bairro,c.cidade].filter(Boolean).join(', '));window.open('https://www.google.com/maps/search/?api=1&query='+q,'_blank')}
    function abrirEditarCliente(){const c=getClient();if(!c)return;['nome','apelido','responsavel','telefone','cnpj','regiao','endereco','numero','bairro','cidade','status','obs'].forEach(k=>{const el=document.getElementById('edit_'+k);if(el) el.value=c[k]||''});document.getElementById('editarClienteModal').classList.add('show')}
    function fecharEditarCliente(){document.getElementById('editarClienteModal').classList.remove('show')}
    function salvarClienteEditado(){const db=loadDB();const id=getClientId();const idx=db.clients.findIndex(c=>c.id===id);if(idx<0)return;const campos=['nome','apelido','responsavel','telefone','cnpj','regiao','endereco','numero','bairro','cidade','status','obs'];campos.forEach(k=>db.clients[idx][k]=document.getElementById('edit_'+k).value.trim());saveDB(db);fecharEditarCliente();render()}
    function excluirClienteAtual(){const c=getClient();if(!c)return;if(!confirm('Excluir este cliente e os pedidos vinculados?')) return;const db=loadDB();db.clients=db.clients.filter(x=>x.id!==c.id);db.orders=db.orders.filter(o=>o.clientId!==c.id);db.route.clients=db.route.clients.filter(id=>id!==c.id);if(db.currentOrder&&db.currentOrder.clientId===c.id) db.currentOrder=null;saveDB(db);location.href='clientes.html'}
    document.addEventListener('DOMContentLoaded',render)
  </script>
</body>
</html>
