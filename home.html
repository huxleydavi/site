<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#254e39">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- =================                                    ================= -->
    <!-- =================           JS LIBS                  ================= -->
    <!-- =================                                    ================= -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- =================                                    ================= -->
    <!-- =================                                    ================= -->

    <!-- =================                                    ================= -->
    <!-- =================           JS CONTROLE              ================= -->
    <!-- =================                                    ================= -->

    <script src="js/geral.js"></script>
    <script src="js/util.js"></script>
    <script src="js/carregar.js"></script>
    <script src="js/carrinho.js"></script>
    <script src="js/formulario.js"></script>
    <script src="js/pdf.js"></script>
    <script src="js/alerts_efects.js"></script>
    <script src="js/mask.js"></script>

    <!-- =================                                    ================= -->
    <!-- =================                                    ================= -->

    <link rel="icon" type="image/png" href="img/icon.jpg"/>
    <link rel="stylesheet" href="css/style.css">
    <title>Aristóteles Botinas</title>

</head>
<body>

<!-- =========================================================
        HEADER
========================================================= -->
<header id="headerPremium">
    <div class="left">
        <button class="back-btn" onclick="voltar()">←</button>
    </div>

    <div class="center">
        <div class="logo-text">
            <span class="verde">ARISTÓTELES</span>
            <span class="vermelho">BOTINAS</span>
        </div>
    </div>

    <div class="right">
        <div class="status-dot"></div>
    </div>
</header>

<!-- =========================================================
        GRID DE PRODUTOS
========================================================= -->
<div class="container">
    <div class="grid" id="produtos"></div>
</div>

<!-- =========================================================
        MODAL PRODUTO
========================================================= -->
<div class="modal" id="modalProduto">
    <div class="box">
        <button class="fechar" onclick="fecharProduto()">X</button>

        <h3 id="nomeProduto"></h3>
        <img id="imgProduto">

        <select id="cor">
            <option>Palha</option>
            <option>Preta</option>
            <option>Relva</option>
            <option>Pinhão</option>
            <option>Tabaco</option>
        </select>

        <div class="tamanhos" id="tamanhos"></div>

        <div class="totalfinal">
            <b>
                Pares: <span id="pares">0</span> |
                Total: R$ <span id="total">0</span>
            </b>
        </div>

        <button class="btn" onclick="addCarrinho()">Adicionar</button>
    </div>
</div>

<!-- =========================================================
        MODAL CARRINHO
========================================================= -->
<div class="modal" id="modalCarrinho">
    <div class="box">
        <button class="fechar" onclick="fecharCarrinho()">X</button>

        <h3>Seu Carrinho</h3>
        <div id="listaCarrinho"></div>

        <div class="acoes-carrinho">
            <button class="btn" onclick="fecharCarrinho()">➕ Adicionar mais</button>
            <button class="btn destaque" onclick="finalizar()">✅ Finalizar Pedido</button>
        </div>
    </div>
</div>

<!-- =========================================================
        BOTÃO FLUTUANTE DO CARRINHO
========================================================= -->
<div class="carrinho-btn" onclick="abrirCarrinho()">
    🛒 Carrinho (<span id="qtd">0</span>)
</div>

<!-- =========================================================
        POPUP FINAL (PÓS PEDIDO / WHATSAPP)
========================================================= -->
<div id="popupFinal" style="
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
">
    <div style="
        background:#fff;
        padding:25px;
        border-radius:12px;
        width:90%;
        max-width:350px;
        text-align:center;
        animation:aparecer 0.3s ease;
    ">
        <h3 style="margin-top:0;">✅ Pedido Finalizado</h3>

        <p style="font-size:14px;">
            O PDF foi baixado com sucesso.<br><br>
            Agora envie pelo WhatsApp 👇
        </p>

        <button onclick="abrirWhatsAppFinal()" style="
            background: linear-gradient(135deg,#25d366,#128c7e);
            color:#fff;
            border:none;
            padding:14px;
            margin-bottom:20px;
            width:100%;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        ">
            📲 ENVIAR PEDIDO NO WHATSAPP
        </button>

        <button onclick="fecharPopup()" style="
            background:#ccc;
            border:none;
            padding:10px;
            width:100%;
            border-radius:8px;
            cursor:pointer;
        ">
            Fechar
        </button>
    </div>
</div>

<!-- =========================================================
        ELEMENTO OCULTO (PDF / UTILITÁRIO)
========================================================= -->
<div id="areaPDF" style="display:none;"></div>

<!-- =========================================================
        MODAL DE ALERTA GLOBAL
========================================================= -->
<div id="alertBox" class="alert-overlay">
    <div class="alert-modal">
        <div class="alert-icon" id="alertIcon">⚠️</div>
        <h3 id="alertTitle">Atenção</h3>
        <p id="alertMsg">Mensagem aqui</p>

        <div class="alert-actions">
            <button onclick="fecharAlerta()" class="btn-sec">Fechar</button>
            <button id="alertConfirm" class="btn-main" onclick="confirmarAlerta()" style="display:none;">OK</button>
        </div>
    </div>
</div>

<!-- =========================================================
        MODAL - DADOS DO CLIENTE
========================================================= -->
<div id="modalCliente" class="alert-overlay" style="display:none;">
    <div class="alert-modal" style="max-width:400px;">
        <button class="btn-sec" onclick="voltarCarrinho()">← Voltar ao carrinho</button>

        <h3>📋 Dados do Cliente</h3>

        <input id="cepCliente" placeholder="CEP" class="input">
        <input id="nomeCliente" placeholder="Nome" class="input">
        <input id="cnpjCliente" placeholder="CNPJ" class="input">
        <input id="telCliente" placeholder="Telefone" class="input">
        <input id="endCliente" placeholder="Endereço" class="input" readonly>

        <button id="btnCliente" class="btn-main" onclick="confirmarCliente()">Continuar</button>
    </div>
</div>

<!-- =========================================================
        ANIMAÇÃO DO POPUP
========================================================= -->
<style>
    @keyframes aparecer {
        from {
            transform: scale(0.9);
            opacity: 0;
        }
        to {
            transform: scale(1);
            opacity: 1;
        }
    }
</style>

<script>
//////////////////////////////////////////////////////
// 🚀 INICIALIZAÇÃO
//////////////////////////////////////////////////////

carregar();
carregarCarrinho();

//////////////////////////////////////////////////////
// 📲 SERVICE WORKER (PWA)
//////////////////////////////////////////////////////

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("js/service-worker.js")
        .then(reg => {
            reg.onupdatefound = () => {
                const newWorker = reg.installing;

                newWorker.onstatechange = () => {
                    if (newWorker.state === "installed") {
                        if (navigator.serviceWorker.controller) {
                            console.log("🔥 NOVA VERSÃO DISPONÍVEL");
                            window.location.reload();
                        }
                    }
                };
            };
        });
}
</script>

</body>
</html>
