<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Pedidos - Aristóteles Botinas</title>
  <link rel="stylesheet" href="css/vendedor-shared.css">
  <style>
    :root{
      --verde:#254e39;
      --verde-escuro:#1d3d2d;
      --vermelho:#b22222;
      --fundo:#f5f5f5;
      --texto:#1f1f1f;
      --sub:#6b7280;
      --borda:#e8e8e8;
      --sombra:0 8px 24px rgba(0,0,0,.08);
      --card:#ffffff;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:var(--fundo);
      color:var(--texto);
      min-height:100vh;
    }



    .top-actions{
      margin-top:10px;
      display:flex;
      gap:8px;
      justify-content:center;
      flex-wrap:wrap;
    }

    main{
      max-width:1100px;
      margin:0 auto;
      padding:16px;
      padding-bottom:110px;
    }

    .hero{
      margin-bottom:14px;
    }

    .hero h1{
      font-size:34px;
      line-height:1.1;
      color:#18222c;
      margin-bottom:4px;
    }

    .hero p{
      color:var(--sub);
      font-size:13px;
      line-height:1.5;
    }

    .search-box{
      display:flex;
      align-items:center;
      gap:10px;
      background:#fff;
      border:1px solid var(--borda);
      border-radius:16px;
      padding:12px 14px;
      box-shadow:var(--sombra);
      margin-bottom:10px;
    }

    .search-box input{
      flex:1;
      border:none;
      outline:none;
      font-size:14px;
      background:transparent;
    }

    .filters{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .filter-btn{
      border:none;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      background:#fff;
      color:var(--verde);
      border:1px solid #dde5df;
    }

    .filter-btn.active{
      background:linear-gradient(135deg,var(--verde),var(--verde-escuro));
      color:#fff;
      border-color:transparent;
    }

    .orders-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .order-card{
      background:var(--card);
      border:1px solid var(--borda);
      border-radius:20px;
      box-shadow:var(--sombra);
      padding:14px;
    }

    .order-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }

    .order-head h3{
      font-size:16px;
      color:#111827;
      margin-bottom:4px;
    }

    .order-head p{
      font-size:12px;
      color:var(--sub);
      line-height:1.45;
    }

    .status{
      background:#e9f5ec;
      color:#1f6b3d;
      border-radius:999px;
      padding:6px 10px;
      font-size:11px;
      font-weight:800;
      white-space:nowrap;
    }

    .info-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:10px;
    }

    .info-box{
      background:#fafafa;
      border:1px solid #efefef;
      border-radius:12px;
      padding:10px;
    }

    .info-box small{
      display:block;
      color:var(--sub);
      font-size:11px;
      margin-bottom:4px;
    }

    .info-box strong{
      font-size:15px;
      color:var(--verde);
    }

    .items-box{
      background:#fafafa;
      border:1px solid #efefef;
      border-radius:12px;
      padding:10px;
      font-size:12px;
      line-height:1.5;
      color:#374151;
      white-space:pre-line;
      margin-bottom:10px;
      min-height:60px;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
    }

    .actions button{
      border:none;
      border-radius:12px;
      padding:11px 10px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .btn-light{
      background:#f7f7f7;
      color:var(--verde);
      border:1px solid #e6e6e6;
    }

    .btn-pdf{
      background:#f7f7f7;
      color:#222;
      border:1px solid #ececec;
    }

    .btn-repeat{
      background:linear-gradient(135deg,var(--verde),var(--verde-escuro));
      color:#fff;
    }

    .empty{
      background:#fff;
      border:1px dashed #d7d7d7;
      border-radius:18px;
      padding:24px;
      text-align:center;
      color:var(--sub);
      box-shadow:var(--sombra);
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:18px;
    }

    .modal-box{
      background:#fff;
      width:100%;
      max-width:760px;
      max-height:92vh;
      overflow:auto;
      border-radius:20px;
      padding:20px;
      box-shadow:0 24px 64px rgba(0,0,0,.22);
      position:relative;
    }

    .modal-close{
      position:absolute;
      top:12px;
      right:12px;
      width:36px;
      height:36px;
      border:none;
      border-radius:10px;
      background:#f1f1f1;
      cursor:pointer;
      font-weight:800;
    }

    .detail-top{
      padding-right:42px;
      margin-bottom:14px;
    }

    .detail-top h3{
      font-size:24px;
      margin-bottom:6px;
      color:#111827;
    }

    .detail-top p{
      color:var(--sub);
      font-size:13px;
      line-height:1.5;
    }

    .detail-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }

    .detail-card{
      border:1px solid #ececec;
      background:#fafafa;
      border-radius:14px;
      padding:12px;
    }

    .detail-card small{
      display:block;
      font-size:11px;
      color:var(--sub);
      margin-bottom:4px;
    }

    .detail-card strong{
      color:var(--verde);
      font-size:15px;
    }

    .detail-items{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .detail-item{
      display:grid;
      grid-template-columns:72px 1fr;
      gap:12px;
      border:1px solid #ececec;
      background:#fff;
      border-radius:14px;
      padding:10px;
    }

    .detail-item img{
      width:100%;
      height:72px;
      object-fit:cover;
      border-radius:10px;
      background:#f3f3f3;
    }

    .detail-item h4{
      margin-bottom:6px;
      font-size:15px;
    }

    .detail-item p{
      font-size:12px;
      color:#4b5563;
      line-height:1.5;
      white-space:pre-line;
    }

    .detail-total{
      margin-top:14px;
      background:linear-gradient(135deg,var(--verde),var(--verde-escuro));
      color:#fff;
      border-radius:16px;
      padding:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .footer-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#fff;
      border-top:1px solid #ddd;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      padding:8px 4px calc(8px + env(safe-area-inset-bottom));
      z-index:999;
      box-shadow:0 -4px 14px rgba(0,0,0,.06);
    }

    .footer-nav button{
      background:none;
      border:none;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:18px;
      cursor:pointer;
      color:#333;
      padding:6px 4px;
    }

    .footer-nav button span{
      font-size:11px;
      font-weight:700;
    }

    .footer-nav button.active{
      color:#254e39;
    }

    @media (min-width:900px){
      .orders-grid{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width:700px){
      .actions{
        grid-template-columns:1fr;
      }

      .info-grid,
      .detail-grid{
        grid-template-columns:1fr;
      }

      .detail-item{
        grid-template-columns:1fr;
      }

      .detail-item img{
        height:180px;
      }

      .hero h1{
        font-size:28px;
      }
    }
  </style>
</head>
<body>
<header class="top-header">
    <h2>Área do Vendedor</h2>

    <div class="nav-header">
        <button onclick="location.href='vendedores.html'">🏠 Painel</button>
        <button onclick="location.href='clientes.html'" class="ativo">👥 Clientes</button>
        <button onclick="location.href='novo-pedido.html'">🛒 Pedido</button>
        <button onclick="location.href='historico-pedidos.html'">📄 Histórico</button>
        <button onclick="location.href='rota.html'">📍 Rota</button>
    </div>
</header>

  <main>
    <section class="hero">
      <h1>Histórico de Pedidos<br>realizados</h1>
      <p>Consulte pedidos anteriores, veja os detalhes completos, baixe o PDF novamente ou repita um pedido.</p>
    </section>

    <div class="search-box">
      <span>🔍</span>
      <input id="buscaHistorico" type="text" placeholder="Buscar por número do pedido, cliente, cidade ou data">
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="todos">Todos</button>
      <button class="filter-btn" data-filter="hoje">Hoje</button>
      <button class="filter-btn" data-filter="semana">Esta semana</button>
      <button class="filter-btn" data-filter="mes">Este mês</button>
      <button class="filter-btn" data-filter="maior">Maior valor</button>
    </div>

    <section class="orders-grid" id="historicoLista"></section>
  </main>

  <div class="modal" id="detalheModal">
    <div class="modal-box">
      <button class="modal-close" onclick="fecharDetalhes()">X</button>
      <div id="detalheConteudo"></div>
    </div>
  </div>

  <script>
    const KEY = 'aristoteles_vendedor_pro_db';
    let filtroAtual = 'todos';

    function safe(v){
      return String(v ?? '').replace(/[&<>"]/g, m => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;'
      }[m]));
    }

    function excluirPedido(id){
      if(!confirm("Deseja excluir este pedido?")) return;

      const db = loadDB();

      db.orders = db.orders.filter(p => String(p.id) !== String(id));

      saveDB(db);

      renderHistorico();
    }

    function fmtMoney(v){
      return Number(v || 0).toLocaleString('pt-BR', {
        style:'currency',
        currency:'BRL'
      });
    }

    function formatDateBR(iso){
      if(!iso) return '-';
      const d = new Date(iso);
      if(Number.isNaN(d.getTime())) return iso;
      return d.toLocaleDateString('pt-BR');
    }

    function loadDB(){
      try{
        const db = JSON.parse(localStorage.getItem(KEY)) || {};
        db.orders = Array.isArray(db.orders) ? db.orders : [];
        db.clients = Array.isArray(db.clients) ? db.clients : [];
        db.currentOrder = db.currentOrder && typeof db.currentOrder === 'object' ? db.currentOrder : null;
        return db;
      }catch(e){
        return {
          orders: [],
          clients: [],
          currentOrder: null
        };
      }
    }

    function saveDB(db){
      localStorage.setItem(KEY, JSON.stringify(db));
    }

    function uid(p){
      return p + '_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    }

    function getClient(db, clientId){
      return db.clients.find(x => x.id === clientId) || null;
    }

    function getClientName(db, clientId){
      const c = getClient(db, clientId);
      return c ? c.nome : 'Cliente não encontrado';
    }

    function getClientCity(db, clientId){
      const c = getClient(db, clientId);
      if(!c) return '-';
      if(c.bairro && c.cidade) return `${c.bairro} - ${c.cidade}`;
      return c.cidade || c.bairro || '-';
    }

    function resumoItens(order){
      const items = order?.items || [];
      return items.map(i => `${i.nome} - ${i.qtd} pares`).join('\n');
    }

    function totalPares(order){
      return (order?.items || []).reduce((a, i) => a + Number(i.qtd || 0), 0);
    }

    function totalProdutos(order){
      return (order?.items || []).length;
    }

    function hojeRange(){
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
      return { start, end };
    }

    function semanaRange(){
      const now = new Date();
      const day = now.getDay();
      const diff = day === 0 ? 6 : day - 1;
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diff);
      start.setHours(0,0,0,0);
      const end = new Date(start);
      end.setDate(start.getDate() + 7);
      return { start, end };
    }

    function mesRange(){
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), 1);
      const end = new Date(now.getFullYear(), now.getMonth() + 1, 1);
      return { start, end };
    }

    function applyFilter(orders){
      let lista = [...orders];

      if(filtroAtual === 'maior'){
        lista.sort((a,b) => Number(b.total || 0) - Number(a.total || 0));
        return lista;
      }

      if(filtroAtual === 'hoje' || filtroAtual === 'semana' || filtroAtual === 'mes'){
        const range = filtroAtual === 'hoje'
          ? hojeRange()
          : filtroAtual === 'semana'
            ? semanaRange()
            : mesRange();

        lista = lista.filter(o => {
          const d = new Date(o.createdAt || o.criadoEm || o.data || '');
          if(Number.isNaN(d.getTime())) return false;
          return d >= range.start && d < range.end;
        });
      }

      lista.sort((a,b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
      return lista;
    }

    function applySearch(db, orders){
      const term = (document.getElementById('buscaHistorico').value || '').toLowerCase().trim();
      if(!term) return orders;

      return orders.filter(order => {
        const cliente = getClientName(db, order.clientId).toLowerCase();
        const cidade = getClientCity(db, order.clientId).toLowerCase();
        const id = String(order.id || '').toLowerCase();
        const data = formatDateBR(order.createdAt || order.criadoEm || '').toLowerCase();
        const itens = (order.items || []).map(i => `${i.nome} ${i.qtd} ${i.codigo || ''}`).join(' ').toLowerCase();

        return (
          id.includes(term) ||
          cliente.includes(term) ||
          cidade.includes(term) ||
          data.includes(term) ||
          itens.includes(term)
        );
      });
    }

    function renderHistorico(){
      const db = loadDB();
      const box = document.getElementById('historicoLista');

      let orders = Array.isArray(db.orders) ? db.orders : [];
      orders = applyFilter(orders);
      orders = applySearch(db, orders);

      if(!orders.length){
        box.innerHTML = `<div class="empty">Nenhum pedido encontrado.</div>`;
        return;
      }

      box.innerHTML = orders.map(order => `
        <article class="order-card">
          <div class="order-head">
            <div>
              <h3>Pedido #${safe(order.id || '')}</h3>
              <p>Cliente: ${safe(getClientName(db, order.clientId))}<br>Bairro / Cidade: ${safe(getClientCity(db, order.clientId))}</p>
            </div>
            <span class="status">${safe(order.status || 'Finalizado')}</span>
          </div>

          <div class="info-grid">
            <div class="info-box">
              <small>Data</small>
              <strong>${safe(formatDateBR(order.createdAt || order.criadoEm || ''))}</strong>
            </div>

            <div class="info-box">
              <small>Total</small>
              <strong>${fmtMoney(calcularTotalPedido(order))}</strong>
            </div>

            <div class="info-box">
              <small>Pares</small>
              <strong>${totalPares(order)} pares</strong>
            </div>

            <div class="info-box">
              <small>Itens</small>
              <strong>${totalProdutos(order)} produto${totalProdutos(order) === 1 ? '' : 's'}</strong>
            </div>
          </div>

          <div class="items-box">${safe(resumoItens(order))}</div>

          <div class="actions">
            <button class="btn-light" onclick="verDetalhes('${safe(order.id)}')">Ver detalhes</button>
            <button class="btn-pdf" onclick="baixarPdfPedido('${safe(order.id)}')">PDF</button>
            <button class="btn-repeat" onclick="repetirPedido('${safe(order.id)}')">Repetir pedido</button>
            <button class="btn-remove" onclick="excluirPedido('${order.id}')">Excluir</button>
          </div>
        </article>
      `).join('');
    }

    function verDetalhes(orderId){
      const db = loadDB();
      const order = db.orders.find(o => String(o.id) === String(orderId));
      if(!order) return;

      const cliente = getClient(db, order.clientId);

      const html = `
        <div class="detail-top">
          <h3>Resumo do Pedido #${safe(order.id || '')}</h3>
          <p>
            Cliente: ${safe(cliente?.nome || 'Cliente não encontrado')}<br>
            Data: ${safe(formatDateBR(order.createdAt || order.criadoEm || ''))}<br>
            Status: ${safe(order.status || 'Finalizado')}
          </p>
        </div>

        <div class="detail-grid">
          <div class="detail-card">
            <small>Telefone</small>
            <strong>${safe(cliente?.telefone || '-')}</strong>
          </div>
          <div class="detail-card">
            <small>Apelido</small>
            <strong>${safe(cliente?.apelido || '-')}</strong>
          </div>
          <div class="detail-card">
            <small>Cidade / Bairro</small>
            <strong>${safe(getClientCity(db, order.clientId))}</strong>
          </div>
          <div class="detail-card">
            <small>Endereço</small>
            <strong>${safe(cliente?.endereco || '-')}</strong>
          </div>
        </div>

        <div class="detail-items">
          ${(order.items || []).map(item => `
            <div class="detail-item">
              <img src="${safe(item.imagem || '')}" alt="${safe(item.nome || '')}">
              <div>
                <h4>${safe(item.nome || '')}</h4>
                <p>
Cor: ${safe(item.cor || '-')}
Quantidade: ${safe(item.qtd || 0)} pares
Preço unitário: ${fmtMoney(item.preco || 0)}
Subtotal: ${fmtMoney(item.subtotal || 0)}

Tamanhos:
${safe(item.tamanhos || '-')}
                </p>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="detail-total">
          <div><strong>Total de pares:</strong> ${totalPares(order)}</div>
          <div><strong>Total do pedido:</strong> ${fmtMoney(calcularTotalPedido(order))}</div>
        </div>
      `;

      document.getElementById('detalheConteudo').innerHTML = html;
      document.getElementById('detalheModal').style.display = 'flex';
    }

    function fecharDetalhes(){
      document.getElementById('detalheModal').style.display = 'none';
    }

    function repetirPedido(orderId){
      const db = loadDB();
      const order = db.orders.find(o => String(o.id) === String(orderId));
      if(!order) return;

      db.currentOrder = JSON.parse(JSON.stringify({
        ...order,
        id: uid('ped'),
        status: 'rascunho',
        createdAt: new Date().toISOString()
      }));

      saveDB(db);
      location.href = 'carrinho-vendedores.html';
    }

    function montarPdfHtml(order, cliente){
      const itensHtml = (order.items || []).map(item => `
        <tr>
          <td style="padding:10px;border:1px solid #ddd;text-align:center;">
            ${item.imagem ? `<img src="${item.imagem}" style="width:70px;height:70px;object-fit:cover;border-radius:8px;">` : '-'}
          </td>
          <td style="padding:10px;border:1px solid #ddd;">${safe(item.nome || '-')}</td>
          <td style="padding:10px;border:1px solid #ddd;">${safe(item.cor || '-')}</td>
          <td style="padding:10px;border:1px solid #ddd;white-space:pre-line;">${safe(item.tamanhos || '-')}</td>
          <td style="padding:10px;border:1px solid #ddd;text-align:center;">${safe(item.qtd || 0)}</td>
          <td style="padding:10px;border:1px solid #ddd;text-align:right;">${fmtMoney(item.preco || 0)}</td>
          <td style="padding:10px;border:1px solid #ddd;text-align:right;">${fmtMoney(item.subtotal || 0)}</td>
        </tr>
      `).join('');

      return `
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedido ${safe(order.id || '')}</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;padding:24px;color:#111}
  .topo{border-bottom:3px solid #254e39;padding-bottom:12px;margin-bottom:20px}
  .topo h1{margin:0;color:#254e39}
  .topo p{margin:6px 0 0;color:#555}
  .box{border:1px solid #ddd;border-radius:12px;padding:14px;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .campo{background:#fafafa;border:1px solid #eee;border-radius:10px;padding:10px}
  .campo small{display:block;color:#666;margin-bottom:4px}
  .campo strong{color:#254e39}
  table{width:100%;border-collapse:collapse;margin-top:12px}
  th{background:#254e39;color:#fff;padding:10px;border:1px solid #ddd;font-size:12px}
  td{font-size:12px;vertical-align:top}
  .total{margin-top:16px;background:#254e39;color:#fff;padding:14px;border-radius:12px;text-align:right;font-size:18px;font-weight:bold}
</style>
</head>
<body>
  <div class="topo">
    <h1>Aristóteles Botinas</h1>
    <p>Resumo do pedido #${safe(order.id || '')}</p>
  </div>

  <div class="box">
    <div class="grid">
      <div class="campo"><small>Cliente</small><strong>${safe(cliente?.nome || '-')}</strong></div>
      <div class="campo"><small>Apelido</small><strong>${safe(cliente?.apelido || '-')}</strong></div>
      <div class="campo"><small>Telefone</small><strong>${safe(cliente?.telefone || '-')}</strong></div>
      <div class="campo"><small>Cidade</small><strong>${safe(cliente?.cidade || '-')}</strong></div>
      <div class="campo"><small>Bairro</small><strong>${safe(cliente?.bairro || '-')}</strong></div>
      <div class="campo"><small>Endereço</small><strong>${safe(cliente?.endereco || '-')}</strong></div>
      <div class="campo"><small>Data</small><strong>${safe(formatDateBR(order.createdAt || order.criadoEm || ''))}</strong></div>
      <div class="campo"><small>Status</small><strong>${safe(order.status || 'Finalizado')}</strong></div>

      `;
    }

    function calcularTotalPedido(order){
      return (order?.items || []).reduce((acc, item) => {
        return acc + Number(item.subtotal || (Number(item.qtd || 0) * Number(item.preco || 0)));
      }, 0);
    }

    function baixarPdfPedido(orderId){
      const db = loadDB();
      const order = db.orders.find(o => String(o.id) === String(orderId));
      if(!order) return;

      const cliente = getClient(db, order.clientId);
      const html = montarPdfHtml(order, cliente);

      const win = window.open('', '_blank');
      win.document.open();
      win.document.write(html);
      win.document.close();

      setTimeout(() => {
        win.focus();
        win.print();
      }, 400);
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderHistorico();

      document.getElementById('buscaHistorico').addEventListener('input', renderHistorico);

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          filtroAtual = btn.dataset.filter;
          renderHistorico();
        });
      });
    });
  </script>
