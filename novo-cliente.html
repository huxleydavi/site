<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Cliente - Aristóteles Botinas</title>
  <link rel="stylesheet" href="css/vendedor-shared.css">

  <style>
    :root{
      --verde:#254e39;
      --verde-escuro:#1d3d2d;
      --vermelho:#b22222;
      --fundo:#f5f5f5;
      --card:#ffffff;
      --texto:#1f1f1f;
      --sub:#6b7280;
      --borda:#e8e8e8;
      --sombra:0 8px 24px rgba(0,0,0,0.08);
      --radius:16px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:var(--fundo);
      color:var(--texto);
      min-height:100vh;
    }



    main{
      max-width:820px;
      margin:0 auto;
      padding:16px;
      padding-bottom:110px;
    }

    .page-title{
      margin-bottom:16px;
    }

    .page-title h1{
      font-size:24px;
      color:var(--verde);
      margin-bottom:4px;
    }

    .page-title p{
      font-size:14px;
      color:var(--sub);
      line-height:1.5;
    }

    .form-card{
      background:var(--card);
      border:1px solid var(--borda);
      border-radius:20px;
      padding:16px;
      box-shadow:var(--sombra);
    }

    .form-section{
      margin-bottom:18px;
    }

    .form-section:last-child{
      margin-bottom:0;
    }

    .form-section h2{
      font-size:15px;
      color:var(--verde);
      margin-bottom:12px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:13px;
      font-weight:700;
      color:var(--texto);
    }

    .field input,
    .field textarea,
    .field select{
      width:100%;
      border:1px solid #dcdcdc;
      border-radius:14px;
      background:#fff;
      padding:14px;
      font-size:14px;
      outline:none;
      color:var(--texto);
      transition:0.2s;
    }

    .field textarea{
      min-height:90px;
      resize:vertical;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus{
      border-color:var(--verde);
      box-shadow:0 0 0 3px rgba(37,78,57,0.12);
    }

    .field small{
      font-size:12px;
      color:var(--sub);
      line-height:1.4;
    }

    .field-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field-row-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
    }

    .required{
      color:var(--vermelho);
      margin-left:3px;
    }

    .actions{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#fff;
      border-top:1px solid rgba(0,0,0,0.06);
      padding:12px 16px calc(12px + env(safe-area-inset-bottom));
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      z-index:60;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:15px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      width:100%;
    }

    .btn-outline{
      background:#f7f7f7;
      color:var(--verde);
      border:1px solid #e6e6e6;
    }

    .btn-solid{
      background:linear-gradient(135deg,var(--verde),var(--verde-escuro));
      color:#fff;
      box-shadow:var(--sombra);
    }

    .alert-box{
      margin-bottom:14px;
      background:#fff7e9;
      border:1px solid #ffe2a8;
      color:#926200;
      border-radius:14px;
      padding:12px 14px;
      font-size:13px;
      line-height:1.5;
    }

    @media (min-width:768px){
      .form-grid{
        grid-template-columns:1fr 1fr;
      }

      .field-full{
        grid-column:1 / -1;
      }

      .actions{
        max-width:820px;
        margin:0 auto;
        left:50%;
        transform:translateX(-50%);
        border-radius:18px 18px 0 0;
        box-shadow:0 -8px 24px rgba(0,0,0,0.06);
      }
    }

    @media (max-width:560px){
      .field-row,
      .field-row-3{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

<header class="top-header">
    <h2>Área do Vendedor</h2>

    <div class="nav-header">
        <button onclick="location.href='vendedores.html'">🏠 Painel</button>
        <button onclick="location.href='clientes.html'" class="ativo">👥 Clientes</button>
        <button onclick="location.href='novo-pedido.html'">🛒 Pedido</button>
        <button onclick="location.href='historico-pedidos.html'">📄 Histórico</button>
        <button onclick="location.href='rota.html'">📍 Rota</button>
    </div>
</header>
  <main>
    <section class="page-head"><h1>Novo Cliente</h1><p>Os dados serão salvos automaticamente no banco local do navegador.</p></section>
    <section class="form-card">
      <div class="form-section"><h2>Dados principais</h2><div class="form-grid">
        <div class="field"><label>Nome da loja<span class="required">*</span></label><input type="text" placeholder="Ex: Loja do João"></div>
        <div class="field field-full"><label>Apelido da loja</label><input type="text" placeholder="Ex: João Calçados"></div>
        <div class="field"><label>CNPJ</label><input type="text" placeholder="00.000.000/0000-00"></div>
        <div class="field"><label>Telefone<span class="required">*</span></label><input type="text" placeholder="(00) 00000-0000"></div>
        <div class="field field-full"><label>Nome do responsável</label><input type="text" placeholder="Ex: João da Silva"></div>
      </div></div>
      <div class="form-section"><h2>Endereço</h2><div class="form-grid">
        <div class="field"><label>CEP</label><input type="text" placeholder="00000-000"><small>Você pode preencher depois se preferir.</small></div>
        <div class="field"><label>Cidade<span class="required">*</span></label><input type="text" placeholder="Ex: Inhapim"></div>
        <div class="field field-full"><label>Endereço</label><input type="text" placeholder="Rua, avenida, praça..."></div>
        <div class="field-row field-full"><div class="field"><label>Número</label><input type="text" placeholder="Ex: 120"></div><div class="field"><label>Bairro</label><input type="text" placeholder="Ex: Centro"></div></div>
        <div class="field field-full"><label>Complemento</label><input type="text" placeholder="Ex: Sala, fundos, próximo à igreja..."></div>
      </div></div>
      <div class="form-section"><h2>Observações</h2><div class="form-grid">
        <div class="field field-full"><label>Observações internas</label><textarea placeholder="Ex: prefere atendimento à tarde, compra mais botina preta, paga no boleto..."></textarea></div>
        <div class="field"><label>Status</label><select><option>Ativo</option><option>Em prospecção</option><option>Inativo</option></select></div>
        <div class="field"><label>Região</label><input type="text" placeholder="Ex: Inhapim / Caratinga"></div>
      </div></div>
    </section>
  </main>
  <div class="actions"><button class="btn btn-outline" onclick="window.location.href='clientes.html'">Cancelar</button><button class="btn btn-solid" id="salvarClienteBtn">Salvar Cliente</button></div>
  <script src="js/vendedor-db.js"></script>

</body>
</html>
