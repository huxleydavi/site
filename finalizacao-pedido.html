<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalização do Pedido - Aristóteles Botinas</title>
  <link rel="stylesheet" href="css/vendedor-shared.css">

  <style>
    :root{
      --verde:#254e39;
      --verde-escuro:#1d3d2d;
      --vermelho:#b22222;
      --fundo:#f5f5f5;
      --card:#ffffff;
      --texto:#1f1f1f;
      --sub:#6b7280;
      --borda:#e8e8e8;
      --sombra:0 8px 24px rgba(0,0,0,0.08);
      --radius:16px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:var(--fundo);
      color:var(--texto);
      min-height:100vh;
    }

    header{
      position:sticky;
      top:0;
      z-index:50;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      background:rgba(255,255,255,0.88);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(0,0,0,0.04);
    }

    .header-left,
    .header-right{
      width:44px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .back-btn,
    .icon-btn{
      width:40px;
      height:40px;
      border:none;
      border-radius:12px;
      background:#eef2ef;
      color:var(--verde);
      font-size:18px;
      cursor:pointer;
    }

    .header-center{
      flex:1;
      text-align:center;
    }

    .logo{
      font-size:16px;
      font-weight:900;
      letter-spacing:.5px;
    }

    .logo .verde{ color:var(--verde); }
    .logo .vermelho{ color:var(--vermelho); }

    main{
      max-width:980px;
      margin:0 auto;
      padding:16px;
      padding-bottom:140px;
    }

    .top-header{
    background: linear-gradient(135deg, #254e39, #1d3d2d);
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
    box-shadow: 0 4px 14px rgba(0,0,0,.12);
    border-bottom: 1px solid rgba(255,255,255,.08);
}

.top-header h2,
.top-header h1{
    margin: 0;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: .2px;
}

.top-header .nav-header{
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.top-header .nav-header button{
    background: rgba(255,255,255,.12);
    color: #fff;
    border: 1px solid rgba(255,255,255,.14);
    padding: 9px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: .2s;
}

.top-header .nav-header button:hover{
    background: rgba(255,255,255,.2);
    transform: translateY(-1px);
}

.top-header .nav-header button.ativo{
    background: #fff;
    color: #254e39;
    border-color: #fff;
}

    .hero{
      background:linear-gradient(135deg,var(--verde),var(--verde-escuro));
      color:#fff;
      border-radius:20px;
      padding:18px;
      box-shadow:var(--sombra);
      margin-bottom:16px;
    }

    .hero h1{
      font-size:22px;
      margin-bottom:6px;
    }

    .hero p{
      font-size:14px;
      opacity:.92;
      line-height:1.5;
    }

    .layout{
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
    }

    .card{
      background:#fff;
      border:1px solid var(--borda);
      border-radius:18px;
      padding:16px;
      box-shadow:var(--sombra);
    }

    .card h2{
      font-size:16px;
      color:var(--verde);
      margin-bottom:12px;
    }

    .info-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .info-item{
      display:flex;
      flex-direction:column;
      gap:4px;
      padding-bottom:10px;
      border-bottom:1px solid #f0f0f0;
    }

    .info-item:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .info-item span{
      font-size:12px;
      color:var(--sub);
    }

    .info-item strong{
      font-size:14px;
      color:var(--texto);
      line-height:1.45;
    }

    .summary-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .summary-mini{
      background:#fafafa;
      border:1px solid #ededed;
      border-radius:14px;
      padding:12px;
    }

    .summary-mini span{
      display:block;
      font-size:12px;
      color:var(--sub);
      margin-bottom:4px;
    }

    .summary-mini strong{
      display:block;
      font-size:18px;
      color:var(--verde);
      font-weight:900;
    }

    .order-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .order-item{
      background:#fcfcfc;
      border:1px solid #ededed;
      border-radius:14px;
      padding:12px;
    }

    .order-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .order-top h3{
      font-size:14px;
      color:#111;
    }

    .order-top strong{
      font-size:14px;
      color:var(--verde);
    }

    .order-item p{
      font-size:12px;
      color:var(--sub);
      line-height:1.6;
    }

    .obs-textarea{
      width:100%;
      min-height:110px;
      border:1px solid #dcdcdc;
      border-radius:14px;
      padding:14px;
      font-size:14px;
      outline:none;
      resize:vertical;
      color:var(--texto);
    }

    .obs-textarea:focus{
      border-color:var(--verde);
      box-shadow:0 0 0 3px rgba(37,78,57,0.12);
    }

    .alert-box{
      background:#fff8eb;
      border:1px solid #ffe0a3;
      color:#8b6200;
      border-radius:14px;
      padding:13px 14px;
      font-size:13px;
      line-height:1.55;
    }

    .actions-fixed{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#fff;
      border-top:1px solid rgba(0,0,0,0.06);
      padding:12px 16px calc(12px + env(safe-area-inset-bottom));
      box-shadow:0 -10px 24px rgba(0,0,0,0.06);
      z-index:60;
    }

    .actions-wrap{
      max-width:980px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .total-line{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
    }

    .total-line small{
      display:block;
      color:var(--sub);
      font-size:12px;
      margin-bottom:3px;
    }

    .total-line strong{
      display:block;
      color:var(--verde);
      font-size:24px;
      font-weight:900;
    }

    .total-line span{
      font-size:13px;
      color:var(--sub);
      text-align:right;
    }

    .actions-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:15px 16px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      width:100%;
    }

    .btn-outline{
      background:#f7f7f7;
      color:var(--verde);
      border:1px solid #e6e6e6;
    }

    .btn-solid{
      background:linear-gradient(135deg,var(--verde),var(--verde-escuro));
      color:#fff;
      box-shadow:var(--sombra);
    }

    @media (min-width:860px){
      .layout{
        grid-template-columns:1fr 1fr;
      }

      .card.full{
        grid-column:1 / -1;
      }

      .actions-wrap{
        grid-template-columns:1fr auto;
        align-items:center;
      }

      .actions-grid{
        min-width:360px;
      }
    }

    @media (max-width:560px){
      .summary-box{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

<header class="top-header">
    <h2>Área do Vendedor</h2>

    <div class="nav-header">
        <button onclick="location.href='vendedores.html'">🏠 Painel</button>
        <button onclick="location.href='clientes.html'" class="ativo">👥 Clientes</button>
        <button onclick="location.href='novo-pedido.html'">🛒 Pedido</button>
        <button onclick="location.href='historico-pedidos.html'">📄 Histórico</button>
        <button onclick="location.href='rota.html'">📍 Rota</button>
    </div>
</header>
  <main>
    <section class="hero"><h1>Finalização do Pedido</h1><p>Confirme os dados do cliente, revise os itens e finalize o pedido com segurança.</p></section>
    <div id="finalizacaoRoot"></div>
  </main>
  <div class="actions-fixed"><div class="actions-wrap"><div class="total-line" id="finalizacaoTotais"><div><small>Total geral</small><strong>R$ 0,00</strong></div><span>0 pares no total</span></div><div class="actions-grid"><button class="btn btn-outline" id="btnVoltarCarrinho">Voltar ao carrinho</button><button id="confirmarPedidoBtn">Confirmar Pedido</button></div></div></div>
  <script src="js/vendedor-db.js"></script>

</body>
</html>
